<!DOCTYPE html>
<html>
<head>
  <title>Smart Tools Hub</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #38bdf8; }

    .box {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      width: 300px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🔥 Smart Tools Hub</h1>

<!-- AGE CALCULATOR -->
<div class="box">
  <h3>Age Calculator</h3>
  <input type="date" id="dob">
  <button onclick="calcAge()">Calculate</button>
  <p id="ageResult"></p>
</div>

<!-- EMI CALCULATOR -->
<div class="box">
  <h3>EMI Calculator</h3>
  <input type="number" id="loan" placeholder="Loan Amount">
  <input type="number" id="rate" placeholder="Interest %">
  <input type="number" id="time" placeholder="Months">
  <button onclick="calcEMI()">Calculate</button>
  <p id="emiResult"></p>
</div>

<!-- RANDOM PASSWORD -->
<div class="box">
  <h3>Password Generator</h3>
  <button onclick="genPass()">Generate</button>
  <p id="passResult"></p>
</div>

<!-- SIMPLE CALCULATOR -->
<div class="box">
  <h3>Quick Calculator</h3>
  <input id="calcInput" placeholder="e.g. 5+5">
  <button onclick="calc()">=</button>
  <p id="calcResult"></p>
</div>

<script>
function calcAge() {
  let dob = new Date(document.getElementById("dob").value);
  let diff = Date.now() - dob.getTime();
  let age = new Date(diff).getUTCFullYear() - 1970;
  document.getElementById("ageResult").innerText = "Age: " + age;
}

function calcEMI() {
  let P = document.getElementById("loan").value;
  let r = document.getElementById("rate").value / 12 / 100;
  let n = document.getElementById("time").value;
  let emi = (P * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
  document.getElementById("emiResult").innerText = "EMI: " + Math.round(emi);
}

function genPass() {
  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let pass = "";
  for (let i=0;i<8;i++) {
    pass += chars.charAt(Math.floor(Math.random()*chars.length));
  }
  document.getElementById("passResult").innerText = pass;
}

function calc() {
  let exp = document.getElementById("calcInput").value;
  try {
    document.getElementById("calcResult").innerText = eval(exp);
  } catch {
    document.getElementById("calcResult").innerText = "Error";
  }
}
</script>

</body>
</html>
