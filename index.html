<!DOCTYPE html>
<html>
<head>
  <title>Smart Tools Pro Max</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
      color: #38bdf8;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    .copy {
      background: #22c55e;
    }

    .result {
      margin-top: 10px;
      color: #22c55e;
      word-wrap: break-word;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>🚀 Smart Tools Pro Max</header>

<div class="container">

  <!-- AGE -->
  <div class="card">
    <h3>Age Calculator</h3>
    <input type="date" id="dob">
    <button onclick="calcAge()">Calculate</button>
    <div class="result" id="age"></div>
  </div>

  <!-- EMI -->
  <div class="card">
    <h3>EMI Calculator</h3>
    <input type="number" id="loan" placeholder="Loan Amount">
    <input type="number" id="rate" placeholder="Interest %">
    <input type="number" id="time" placeholder="Months">
    <button onclick="calcEMI()">Calculate</button>
    <div class="result" id="emi"></div>
  </div>

  <!-- PASSWORD -->
  <div class="card">
    <h3>Password Generator</h3>
    <button onclick="genPass()">Generate</button>
    <div class="result" id="pass"></div>
    <button class="copy" onclick="copyText('pass')">Copy</button>
  </div>

  <!-- CALCULATOR -->
  <div class="card">
    <h3>Calculator</h3>
    <input id="exp" placeholder="10+20">
    <button onclick="calc()">Calculate</button>
    <div class="result" id="res"></div>
  </div>

  <!-- HASHTAG -->
  <div class="card">
    <h3>Hashtag Generator</h3>
    <input id="tagInput" placeholder="fashion">
    <button onclick="genTags()">Generate</button>
    <div class="result" id="tags"></div>
    <button class="copy" onclick="copyText('tags')">Copy</button>
  </div>

  <!-- BIO GENERATOR -->
  <div class="card">
    <h3>Instagram Bio Generator</h3>
    <input id="name" placeholder="Your Name">
    <button onclick="genBio()">Generate</button>
    <div class="result" id="bio"></div>
    <button class="copy" onclick="copyText('bio')">Copy</button>
  </div>

</div>

<footer>
💰 Free Tools | Built for Growth 🚀
</footer>

<script>
function calcAge() {
  let dob = new Date(document.getElementById("dob").value);
  let age = new Date(Date.now() - dob).getUTCFullYear() - 1970;
  document.getElementById("age").innerText = "Age: " + age;
}

function calcEMI() {
  let P = document.getElementById("loan").value;
  let r = document.getElementById("rate").value / 12 / 100;
  let n = document.getElementById("time").value;
  let emi = (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  document.getElementById("emi").innerText = "EMI: ₹" + Math.round(emi);
}

function genPass() {
  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let pass = "";
  for (let i=0;i<10;i++) {
    pass += chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById("pass").innerText = pass;
}

function calc() {
  try {
    document.getElementById("res").innerText = eval(document.getElementById("exp").value);
  } catch {
    document.getElementById("res").innerText = "Error";
  }
}

function genTags() {
  let k = document.getElementById("tagInput").value;
  let tags = `#${k}, #${k}style, #${k}trend, #viral, #explore, #insta, #reels, #trending`;
  document.getElementById("tags").innerText = tags;
}

function genBio() {
  let n = document.getElementById("name").value;
  let bio = `${n} | Dream big 💫 | Hustle daily 🔥 | Success loading 🚀`;
  document.getElementById("bio").innerText = bio;
}

function copyText(id) {
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
