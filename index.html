<!DOCTYPE html>
<html>
<head>
  <title>Pro Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1e1e2f;
      font-family: Arial;
    }

    .calculator {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 24px;
      margin-bottom: 10px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 10px;
    }

    button {
      height: 60px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .num { background: #3a3a4f; color: white; }
    .op { background: orange; color: white; }
    .clear { background: red; color: white; }
    .equal { background: green; color: white; }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="op" onclick="append('/')">/</button>
    <button class="op" onclick="append('*')">*</button>
    <button class="op" onclick="append('-')">-</button>

    <button class="num" onclick="append('7')">7</button>
    <button class="num" onclick="append('8')">8</button>
    <button class="num" onclick="append('9')">9</button>
    <button class="op" onclick="append('+')">+</button>

    <button class="num" onclick="append('4')">4</button>
    <button class="num" onclick="append('5')">5</button>
    <button class="num" onclick="append('6')">6</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="num" onclick="append('1')">1</button>
    <button class="num" onclick="append('2')">2</button>
    <button class="num" onclick="append('3')">3</button>
    <button class="num" onclick="append('.')">.</button>

    <button class="num" onclick="append('0')">0</button>
  </div>
</div>

<script>
  function append(value) {
    document.getElementById("display").value += value;
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }

  function calculate() {
    try {
      let result = eval(document.getElementById("display").value);
      document.getElementById("display").value = result;
    } catch {
      document.getElementById("display").value = "Error";
    }
  }
</script>

</body>
</html>
